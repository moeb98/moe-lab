---

services:
  syncthing:
    image: syncthing/syncthing
    container_name: syncthing

    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin

    volumes:
      - /srv/syncthing/config:/var/syncthing/config
#      - /srv/syncthing/data:/data
      - /mnt/nas/music:/data/music
      - /mnt/nas/album:/data/album
      - /mnt/nas/lr:/data/lr

#    ports:
#      - 8384:8384
#      - 22000:22000/tcp
#      - 22000:22000/udp
#      - 21027:21027/udp

    network_mode: host
    restart: unless-stopped
